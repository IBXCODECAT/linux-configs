general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    disable_loading = true
}

background {
    monitor =
    path = screenshot
    color = rgba(0, 0, 0, 1.0)
    brightness = 0.5 
    blur_passes = 0
}

# Large "Locked" Header
label {
    monitor =
    text = [ SYSTEM LOCKED ]
    color = rgb(255, 0, 0)
    font_size = 45
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 150
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 600, 80
    
    # Invisible box
    outline_thickness = 0
    inner_color = rgba(0, 0, 0, 0)
    outer_color = rgba(0, 0, 0, 0)
    
    # Red Asterisks
    font_color = rgb(255, 0, 0) 
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    dots_fade_animation = false
    dots_text_format = *
    
    # Failure message setup
    check_color = rgba(0, 0, 0, 0)
    fail_color = rgba(0, 0, 0, 0)
    fail_text = <span foreground="##ff0000">[ AUTHENTICATION FAILED ]</span>
    fail_transition = 0
    
    # Red Prompt Text
    fade_on_empty = false
    placeholder_text = <span foreground="##ff0000">Start typing to enter password</span>
    hide_input = false
    
    position = 0, 0
    halign = center
    valign = center
}
